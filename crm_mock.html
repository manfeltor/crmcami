function pad2(x){ return String(x).padStart(2,"0"); }
function isoFromDate(d){ return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()); }
const todayStr = () => isoFromDate(new Date());
const currentMonthKey = () => todayStr().slice(0,7);

function normServicio(s){
  if(!s) return "";
  const t = ("" + s).toLowerCase();
  if(t.indexOf("cross")>=0 || t.indexOf("croos")>=0) return "Cross-docking";
  if(t.indexOf("almac")>=0 || t.indexOf("fulfil")>=0) return "Almacenamiento";
  return s;
}
function mapEstado(raw){
  const t = ("" + (raw||"")).toLowerCase();
  if(t.indexOf("ganada")>=0) return "6. Venta ganada";
  if(t.indexOf("no viable")>=0) return "7. No viable";
  if(t.indexOf("no avanz")>=0 || t.indexOf("sin respuesta")>=0) return "8. No avanzó";
  if(t.indexOf("negoci")>=0 || t.indexOf("re-cotiz")>=0 || t.indexOf("recotiz")>=0) return "5. Negociando / Re-cotizar";
  if(t.indexOf("interesad")>=0) return "4. Interesado";
  if(t.indexOf("cotizado")>=0) return "3. Cotizado";
  if(t.indexOf("pend")>=0 && t.indexOf("cotiz")>=0) return "2. Pendiente cotizar";
  if(t.indexOf("dato")>=0 || t.indexOf("pend")>=0) return "1. Datos pendientes";
  return "1. Datos pendientes";
}
function mapResp(raw){
  const t = ("" + (raw||"")).toLowerCase();
  if(t.indexOf("cami")>=0) return "Camila";
  if(t.indexOf("cesar")>=0 || t.indexOf("cés")>=0) return "Cesar";
  return raw || "";
}
function codPeriodo(fecha){
  if(!fecha) return "";
  const d = new Date(fecha + "T00:00:00");
  if(isNaN(d)) return "";
  return String(d.getFullYear()).slice(-2) + pad2(d.getMonth()+1) + " - " + MESES[d.getMonth()];
}
const monthKey = (fecha)=> fecha ? ("" + fecha).slice(0,7) : "";
function monthLabel(key){
  if(!key) return "Sin fecha";
  const parts = key.split("-");
  return MESES[(+parts[1])-1] + " " + parts[0];
}
function shortMonth(key){
  if(!key) return "-";
  const p = key.split("-");
  return MESES[(+p[1])-1].slice(0,3) + " " + p[0].slice(-2);
}
function daysSince(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  if(isNaN(d)) return null;
  return Math.floor((new Date(todayStr() + "T00:00:00") - d) / 86400000);
}
function fmtDT(iso){
  if(!iso) return "-";
  try{ return new Date(iso).toLocaleString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }catch(e){ return iso; }
}
function lastActivityDate(r){
  let best = r.estadoFecha || r.fecha || "";
  (r.historial||[]).forEach(function(e){ const d=(""+e.ts).slice(0,10); if(d>best) best=d; });
  return best;
}
const isFinal = (estado)=> ESTADOS_FINALES.indexOf(estado) >= 0;
function isStale(r){
  if(isFinal(r.estado)) return false;
  const d = daysSince(lastActivityDate(r));
  return d !== null && d > 30;
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function waDigits(tel){
  let n = ("" + tel).replace(/[^0-9]/g, "");
  if(!n) return "";
  n = n.replace(/^0+/, "");
  if(n.indexOf("54") === 0){ return "549" + n.slice(2).replace(/^9/, ""); }
  return "549" + n;
}

function buildLineChartDataURL(labels, values){
  const cv = document.createElement("canvas");
  const W=900, H=360; cv.width=W; cv.height=H;
  const ctx = cv.getContext("2d");
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,W,H);
  const padL=50, padR=30, padT=40, padB=50;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  let maxV=1; values.forEach(function(v){ if(v>maxV) maxV=v; });
  ctx.strokeStyle="#e4e7eb"; ctx.lineWidth=1; ctx.fillStyle="#9aa1a8"; ctx.font="14px Arial"; ctx.textAlign="right"; ctx.textBaseline="middle";
  for(let g=0; g<=4; g++){ const yy=padT+plotH*g/4; ctx.beginPath(); ctx.moveTo(padL,yy); ctx.lineTo(W-padR,yy); ctx.stroke(); ctx.fillText(String(Math.round(maxV*(4-g)/4)), padL-8, yy); }
  const n=labels.length;
  const xAt=function(i){ return n===1 ? padL+plotW/2 : padL + plotW*i/(n-1); };
  const yAt=function(v){ return padT + plotH*(1 - v/maxV); };
  ctx.strokeStyle="#E2231A"; ctx.lineWidth=3; ctx.beginPath();
  values.forEach(function(v,i){ const x=xAt(i), y=yAt(v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
  ctx.stroke();
  ctx.textAlign="center";
  values.forEach(function(v,i){ const x=xAt(i), y=yAt(v);
    ctx.fillStyle="#E2231A"; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#22262A"; ctx.font="bold 17px Arial"; ctx.textBaseline="bottom"; ctx.fillText(String(v), x, y-9);
    ctx.fillStyle="#6b7280"; ctx.font="13px Arial"; ctx.textBaseline="top"; ctx.fillText(labels[i], x, H-padB+8);
  });
  return cv.toDataURL("image/png", 1.0);
}
function buildMultiLineChartDataURL(labels, series){
  const cv = document.createElement("canvas");
  const W=1000, H=340; cv.width=W; cv.height=H;
  const ctx = cv.getContext("2d");
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,W,H);
  const padL=46, padR=24, padT=54, padB=60;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  let maxV=1; series.forEach(function(s){ s.values.forEach(function(v){ if(v>maxV) maxV=v; }); });
  ctx.strokeStyle="#e4e7eb"; ctx.lineWidth=1; ctx.fillStyle="#9aa1a8"; ctx.font="13px Arial"; ctx.textAlign="right"; ctx.textBaseline="middle";
  for(let g=0;g<=4;g++){ const yy=padT+plotH*g/4; ctx.beginPath(); ctx.moveTo(padL,yy); ctx.lineTo(W-padR,yy); ctx.stroke(); ctx.fillText(String(Math.round(maxV*(4-g)/4)), padL-8, yy); }
  const n=labels.length;
  const xAt=function(i){ return n===1 ? padL+plotW/2 : padL+plotW*i/(n-1); };
  const yAt=function(v){ return padT+plotH*(1-v/maxV); };
  let lx=padL; const ly=24;
  ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.font="bold 14px Arial";
  series.forEach(function(s){ ctx.fillStyle=s.color; ctx.fillRect(lx, ly-7, 14, 14); ctx.fillStyle="#22262A"; ctx.fillText(s.name, lx+20, ly); lx += 34 + ctx.measureText(s.name).width; });
  series.forEach(function(s){
    ctx.strokeStyle=s.color; ctx.lineWidth=3; ctx.beginPath();
    s.values.forEach(function(v,i){ const x=xAt(i), y=yAt(v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
    ctx.stroke();
    ctx.fillStyle=s.color; ctx.textAlign="center"; ctx.textBaseline="bottom"; ctx.font="bold 14px Arial";
    s.values.forEach(function(v,i){ const x=xAt(i), y=yAt(v); ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill(); ctx.fillText(String(v), x, y-7); });
  });
  ctx.textAlign="center"; ctx.textBaseline="top";
  labels.forEach(function(lb,i){
    ctx.fillStyle="#6b7280"; ctx.font="12px Arial"; ctx.fillText(lb, xAt(i), H-padB+10);
    let tot=0; series.forEach(function(s){ tot+=(s.values[i]||0); });
    ctx.fillStyle="#22262A"; ctx.font="bold 13px Arial"; ctx.fillText("Total: "+tot, xAt(i), H-padB+26);
  });
  return cv.toDataURL("image/png", 1.0);
}

function normalizeRow(r){
  const estado = mapEstado(r.estado);
  let subEstado = r.subEstado || "";
  if(("" + (r.estado||"")).toLowerCase().indexOf("sin respuesta")>=0 && !subEstado) subEstado = "Sin respuesta";
  const subAllowed = (estado==="8. No avanzó" || estado==="7. No viable");
  if(!subAllowed) subEstado = "";
  let historial = Array.isArray(r.historial) ? r.historial.slice() : [];
  if(historial.length === 0 && r.comentarios){ historial = [{ ts: (r.fecha || todayStr()) + "T00:00:00", text: r.comentarios }]; }
  const comentarios = historial.length ? historial.map(function(e){ return fmtDT(e.ts) + " - " + e.text; }).join("\n") : (r.comentarios || "");
  return {
    id: r.id || uid(), fecha: r.fecha || "", cliente: r.cliente || "", servicio: normServicio(r.servicio),
    mail: r.mail || "", telefono: r.telefono ? ("" + r.telefono) : "", origen: r.origen || "", subOrigen: r.subOrigen || "",
    resp: mapResp(r.resp), estado: estado, subEstado: subEstado, estadoFecha: r.estadoFecha || r.fecha || todayStr(),
    historial: historial, comentarios: comentarios
  };
}

function BarChart(props){
  const data = props.data;
  const colorMap = props.colorMap;
  const ref = useRef(null); const chart = useRef(null);
  useEffect(function(){
    if(!ref.current) return;
    const labels = Object.keys(data);
    const values = Object.keys(data).map(function(k){ return data[k]; });
    const palette = ["#E2231A","#22262A","#d97706","#2563eb","#059669","#7c3aed","#0891b2"];
    const bg = colorMap ? labels.map(function(l){ return colorMap[l]||"#9ca3af"; }) : labels.map(function(_,i){ return palette[i%palette.length]; });
    const valLabels = { id:"valLabels", afterDatasetsDraw: function(c){
      const ctx=c.ctx; ctx.save(); ctx.font="bold 12px 'Segoe UI',sans-serif"; ctx.fillStyle="#22262A"; ctx.textAlign="center";
      const meta=c.getDatasetMeta(0);
      meta.data.forEach(function(bar,i){ const v=c.data.datasets[0].data[i]; if(v!=null && v!==0) ctx.fillText(v, bar.x, bar.y-5); });
      ctx.restore();
    }};
    if(chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current, {
      type:"bar",
      data:{ labels:labels, datasets:[{ data:values, backgroundColor: bg, borderRadius:6, maxBarThickness:46 }]},
      options:{ responsive:true, maintainAspectRatio:false, layout:{padding:{top:18}}, animation:false, plugins:{ legend:{display:false}, tooltip:{enabled:false} }, scales:{ y:{ beginAtZero:true, ticks:{precision:0}, grid:{color:"#eef0f2"} }, x:{ ticks:{font:{size:9}, maxRotation:30, minRotation:0}, grid:{display:false} } } },
      plugins:[valLabels]
    });
    return function(){ if(chart.current) chart.current.destroy(); };
  },[JSON.stringify(data)]);
  const empty = Object.keys(data).length === 0;
  return (
    <div className="bg-white rounded-xl border border-[var(--line)] p-4 shadow-sm">
      <h3 className="text-sm font-bold text-gray-700 mb-3">{props.title}</h3>
      <div style={{height:220}} className="relative"><canvas id={props.canvasId} ref={ref}></canvas>{empty && <div className="absolute inset-0 flex items-center justify-center text-sm text-gray-400">Sin datos en el periodo</div>}</div>
    </div>
  );
}

function LineChart(props){
  const data = props.data;
  const ref = useRef(null); const chart = useRef(null);
  useEffect(function(){
    if(!ref.current) return;
    const datasets = data.series.map(function(s){ return { label:s.name, data:s.values, borderColor:s.color, backgroundColor:s.color, borderWidth:3, tension:0.25, pointRadius:4, pointHoverRadius:6 }; });
    const vl = { id:"vl", afterDatasetsDraw:function(c){ const ctx=c.ctx; ctx.save(); ctx.font="bold 11px 'Segoe UI',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="bottom"; c.data.datasets.forEach(function(ds,di){ const meta=c.getDatasetMeta(di); if(meta.hidden) return; ctx.fillStyle=ds.borderColor; meta.data.forEach(function(pt,i){ const v=ds.data[i]; if(v!=null && v!==0) ctx.fillText(v, pt.x, pt.y-7); }); }); ctx.restore(); } };
    if(chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current, {
      type:"line",
      data:{ labels:data.labels, datasets:datasets },
      options:{ responsive:true, maintainAspectRatio:false, layout:{padding:{top:16}}, interaction:{mode:"index", intersect:false},
        plugins:{ legend:{display:true, position:"bottom", labels:{boxWidth:12, font:{size:11}}}, tooltip:{ backgroundColor:"#22262A", callbacks:{ footer:function(items){ let t=0; items.forEach(function(it){ t+=it.parsed.y; }); return "Total del mes: "+t; } } } },
        scales:{ y:{ beginAtZero:true, ticks:{precision:0}, grid:{color:"#eef0f2"} }, x:{ grid:{display:false}, ticks:{font:{size:11}} } } },
      plugins:[vl]
    });
    return function(){ if(chart.current) chart.current.destroy(); };
  },[JSON.stringify(data)]);
  return (<div style={{height:props.height||240}} className="relative"><canvas ref={ref}></canvas></div>);
}

  const [fServicio, setFServicio] = useState("");
  const [fOrigen, setFOrigen] = useState("");
  const [soloAlertas, setSoloAlertas] = useState(false);
  const [quickFilter, setQuickFilter] = useState("");
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [sort, setSort] = useState({key:"fecha", dir:"desc"});
  const [sel, setSel] = useState({});
  const [bulkEstado, setBulkEstado] = useState("");
  const [notesLead, setNotesLead] = useState(null);
  const [tally, setTally] = useState(function(){ return DataAPI.loadTally(); });
  const [view, setView] = useState("crm");
  const [nocomDate, setNocomDate] = useState(todayStr());
  const [showTrend, setShowTrend] = useState(function(){ return DataAPI.loadShowTrend(); });
  const fileRef = useRef(null);
  // (maqueta) sin capa de archivo/persistencia: se removieron los refs/estado
  // de File System Access, los useEffect que escribian a localStorage y las
  // funciones writeHandle/loadHandle/connectFile/openFile/reconnectFile.
  // Cuando exista el backend, la persistencia se resuelve en DataAPI (fetch).

  const periodsAsc = useMemo(function(){
    const set = {}; rows.forEach(function(r){ const k = monthKey(r.fecha); if(k) set[k]=true; }); set[currentMonthKey()] = true;
    return Object.keys(set).sort();
  },[rows]);
  const periodsDesc = periodsAsc.slice().reverse();
  const periodLabel = period.length===0 ? "Todos los períodos" : (period.length===1 ? monthLabel(period[0]) : period.length + " meses");
  const periodDetail = function(){
    if(period.length===0){ const s=periodsAsc; return s.length ? ("Todos los períodos (" + monthLabel(s[0]) + " a " + monthLabel(s[s.length-1]) + ")") : "Todos los períodos"; }
    return period.slice().sort().map(monthLabel).join(", ");
  };
  const toggleMonth = function(k){ setPeriod(function(p){ return p.indexOf(k)>=0 ? p.filter(function(x){ return x!==k; }) : p.concat([k]); }); };

  const periodRows = useMemo(function(){ return period.length===0 ? rows : rows.filter(function(r){ return period.indexOf(monthKey(r.fecha))>=0; }); },[rows, period]);

  const matchQuick = function(r){
    if(quickFilter==="abiertas") return ABIERTOS.indexOf(r.estado)>=0;
    if(quickFilter==="ganadas") return r.estado==="6. Venta ganada";
    if(quickFilter==="alertas") return isStale(r);
    return true;
  };
  const filtered = useMemo(function(){
    let r = periodRows.filter(function(x){
      const hay = (x.cliente+" "+x.mail+" "+x.telefono+" "+x.subOrigen+" "+x.comentarios+" "+x.resp+" "+x.subEstado).toLowerCase();
      if(q && hay.indexOf(q.toLowerCase())<0) return false;
      if(fEstado && x.estado!==fEstado) return false;
      if(fServicio && x.servicio!==fServicio) return false;
      if(fOrigen && x.origen!==fOrigen) return false;
      if(soloAlertas && !isStale(x)) return false;
      if(!matchQuick(x)) return false;
      return true;
    });
    r = r.slice().sort(function(a,b){ const va=(a[sort.key]||""), vb=(b[sort.key]||""); return (va<vb?-1:va>vb?1:0) * (sort.dir==="asc"?1:-1); });
    return r;
  },[periodRows,q,fEstado,fServicio,fOrigen,soloAlertas,quickFilter,sort]);

  const byOrigen = useMemo(function(){ const m={}; periodRows.forEach(function(r){ const k=r.origen||"Sin origen"; m[k]=(m[k]||0)+1; }); return m; },[periodRows]);
  const byServicio = useMemo(function(){ const m={}; periodRows.forEach(function(r){ const k=r.servicio||"Sin servicio"; m[k]=(m[k]||0)+1; }); return m; },[periodRows]);
  const byEstado = useMemo(function(){ const m={}; periodRows.forEach(function(r){ const k=r.estado||"-"; m[k]=(m[k]||0)+1; }); return m; },[periodRows]);
  const ganadas = periodRows.filter(function(r){ return r.estado==="6. Venta ganada"; }).length;
  const abiertas = periodRows.filter(function(r){ return ABIERTOS.indexOf(r.estado)>=0; }).length;
  const alertas = periodRows.filter(isStale).length;
  const noviable = periodRows.filter(function(r){ return r.estado==="7. No viable"; }).length;
  const noavanzo = periodRows.filter(function(r){ return r.estado==="8. No avanzó"; }).length;
  const nocomTotalsForPeriod = (function(){ const o={}; NOCOM_CATS.forEach(function(c){ o[c]=0; }); Object.keys(tally).forEach(function(date){ if(period.length===0 || period.indexOf(monthKey(date))>=0){ const day=tally[date]||{}; NOCOM_CATS.forEach(function(c){ o[c]+=(day[c]||0); }); } }); return o; })();
  const bump = function(cat, delta){ setTally(function(t){ const o=Object.assign({}, t); const day=Object.assign({}, o[nocomDate]||{}); day[cat]=Math.max(0,(day[cat]||0)+delta); o[nocomDate]=day; return o; }); };
  const trendData = useMemo(function(){
    if(!showTrend) return null;
    const set={}; periodRows.forEach(function(r){ const k=monthKey(r.fecha); if(k) set[k]=true; });
    const months=Object.keys(set).sort();
    if(months.length===0) return null;
    const labels=months.map(shortMonth);
    const present={}; periodRows.forEach(function(r){ present[r.origen||"Sin origen"]=true; });
    let origList=Object.keys(present);
    const order=function(o){ return o==="SIGNOS"?0:(o==="Referido"?1:2); };
    origList.sort(function(a,b){ return order(a)-order(b); });
    const palette=["#2563eb","#059669","#d97706","#7c3aed","#0891b2"];
    const series=origList.map(function(o,idx){ return {name:o, color:o==="SIGNOS"?"#E2231A":(o==="Referido"?"#22262A":palette[idx%palette.length]), values:months.map(function(mk){ return periodRows.filter(function(r){ return monthKey(r.fecha)===mk && (r.origen||"Sin origen")===o; }).length; })}; });
    return { labels:labels, series:series };
  },[periodRows, showTrend]);

  const toggleQuick = function(v){ setQuickFilter(function(c){ return c===v ? "" : v; }); };

  const save = function(data){
    const now = new Date().toISOString();
    let hist = Array.isArray(data.historial) ? data.historial.slice() : [];
    const nc = (data.nuevoComentario||"").trim();
    const merged = Object.assign({}, data, {historial: hist});
    delete merged.nuevoComentario;
    if(merged.id){
      const prev = rows.find(function(r){ return r.id===merged.id; });
      const estChanged = prev && (prev.estado!==merged.estado || (prev.subEstado||"")!==(merged.subEstado||""));
      if(estChanged){ hist.unshift({ ts: now, text: "Cambio de estado a " + merged.estado + (merged.subEstado ? " (" + merged.subEstado + ")" : "") }); }

        const grid = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:""});
        if(!grid.length){ alert("El archivo esta vacio."); return; }
        const headers = grid[0].map(function(h){ return (""+h).trim(); });
        const find = function(){
          const cands = Array.prototype.slice.call(arguments);
          for(let h=0; h<headers.length; h++){ const hl = headers[h].toLowerCase(); for(let c=0; c<cands.length; c++){ if(hl.indexOf(cands[c].toLowerCase())===0) return h; } }
          return -1;
        };
        const idx = { fecha: find("Fecha de i","Fecha"), cliente: find("Cliente","Razon social","Razon","Nombre"), servicio: find("Servicio"), mail: find("Mail","Email","Correo"), telefono: find("Telefono","Tel"), origen: find("Origen","Canal"), subOrigen: find("Sub-Origen","Sub origen","Suborigen"), resp: find("Resp","Asignado"), estado: find("Estado"), comentarios: find("Comentarios","Notas","Consulta"), subEstado: find("Sub-Estado","Subestado"), estadoFecha: find("Fecha ult") };
        const toISO = function(v){
          if(v===null||v===undefined||v==="") return "";
          if(v instanceof Date && !isNaN(v)) return isoFromDate(v);
          const s = (""+v).trim();
          if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
          const d = new Date(s); return isNaN(d) ? "" : isoFromDate(d);
        };
        const get = function(row,i){ return (i>=0 && row[i]!==undefined) ? row[i] : ""; };
        const imported = [];
        for(let i=1;i<grid.length;i++){
          const row = grid[i]; if(!row || !row.length) continue;
          const cliente = (""+get(row,idx.cliente)).trim(); if(!cliente) continue;
          imported.push(normalizeRow({ fecha: toISO(get(row,idx.fecha)), cliente: cliente, servicio: get(row,idx.servicio), mail: get(row,idx.mail), telefono: get(row,idx.telefono), origen: get(row,idx.origen), subOrigen: get(row,idx.subOrigen), resp: get(row,idx.resp), estado: (""+get(row,idx.estado)).trim(), subEstado: (""+get(row,idx.subEstado)).trim(), estadoFecha: toISO(get(row,idx.estadoFecha)), comentarios: get(row,idx.comentarios) }));
        }

        alert("Importacion completa: "+imported.length+" leads cargados.");
      }catch(err){ alert("Error al leer el archivo: "+err.message); }
      finally{ e.target.value=""; }
    };
    reader.readAsArrayBuffer(file);
  };

                <td className="px-3 py-2 whitespace-nowrap">{r.servicio}</td>
                <td className="px-3 py-2">
                  {r.mail && <div className="text-xs text-blue-600 truncate max-w-[180px]">{r.mail}</div>}
                  {r.telefono && (wa
                    ? <a href={"https://wa.me/"+wa} target="_blank" rel="noopener" className="inline-flex items-center gap-1 text-xs font-semibold text-[#1ebe57] hover:underline">WhatsApp <span className="text-gray-400 font-normal">{r.telefono}</span></a>
                    : <div className="text-xs text-gray-500">{r.telefono}</div>)}
                </td>
                <td className="px-3 py-2 whitespace-nowrap">{r.origen}{r.subOrigen && <div className="text-xs text-gray-400">{r.subOrigen}</div>}</td>
                <td className="px-3 py-2 whitespace-nowrap"><span className="inline-block px-2 py-1 rounded-full text-xs font-semibold text-white" style={{background:ESTADO_COLOR[r.estado]||"#6b7280"}}>{r.estado}</span>{r.subEstado && <div className="text-xs text-gray-400 mt-0.5">{r.subEstado}</div>}</td>
                <td className="px-3 py-2 whitespace-nowrap text-gray-600 cursor-help" title={tip}><div className="text-xs">{la||"-"}</div>{d!==null && (stale ? <div className="text-xs font-semibold text-[var(--red)]">! {d} días sin avances</div> : <div className="text-xs text-gray-400">hace {d} d</div>)}{r.comentarios && <button onClick={function(){ setNotesLead(r); }} className="text-[10px] text-blue-600 underline hover:text-[var(--red)] cursor-pointer">ver comentarios</button>}</td>
                <td className="px-3 py-2 text-right whitespace-nowrap"><button onClick={function(){ openEdit(r); }} className="px-2 py-1 rounded border border-[var(--line)] text-gray-600 hover:text-[var(--red)] hover:border-[var(--red)] text-xs">Editar</button></td>
              </tr>
            );})}
            {filtered.length===0 && <tr><td colSpan="10" className="px-3 py-10 text-center text-gray-400">No hay leads que coincidan con los filtros del período.</td></tr>}
          </tbody>
        </table>
      </div>

      </React.Fragment>
      )}

      {view==="nocom" && (
        <div className="space-y-4">
          <div className="bg-white rounded-xl border border-[var(--line)] p-4 shadow-sm">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div>
                <h2 className="font-bold text-lg">Leads no comerciales</h2>
                <p className="text-xs text-gray-500 max-w-xl">Contá las consultas que no son comerciales (empleo, proveedores, etc.). Cada +1 suma a la fecha elegida, se guarda solo y respeta el período seleccionado arriba. No se cargan datos individuales.</p>
              </div>
              <div className="flex items-center gap-2">
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Fecha a cargar</label>
                <input type="date" value={nocomDate} onChange={function(e){ setNocomDate(e.target.value); }} className={selCls}/>
              </div>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {NOCOM_CATS.map(function(cat){
              const dayCount = (tally[nocomDate]||{})[cat]||0;
              const periodCount = nocomTotalsForPeriod[cat];
              return (
                <div key={cat} className="bg-white rounded-xl border border-[var(--line)] p-5 shadow-sm">
                  <div className="text-sm font-bold text-gray-700">{cat}</div>
                  <div className="text-4xl font-extrabold mt-2" style={{color:"#22262A"}}>{periodCount}</div>
                  <div className="text-xs text-gray-500 mb-3">en el período ({periodLabel})</div>
                  <div className="flex items-center justify-between border-t border-[var(--line)] pt-3">
                    <div className="text-xs text-gray-500">{nocomDate}: <b>{dayCount}</b></div>
                    <div className="flex items-center gap-2">
                      <button onClick={function(){ bump(cat,-1); }} className="w-9 h-9 rounded-lg border border-[var(--line)] text-lg font-bold hover:bg-gray-50">-</button>
                      <button onClick={function(){ bump(cat,1); }} className="w-9 h-9 rounded-lg text-lg font-bold text-white hover:opacity-90" style={{background:"var(--red)"}}>+</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="bg-white rounded-xl border border-[var(--line)] p-4 shadow-sm text-sm text-gray-600">Total no comerciales en el período (<b>{periodLabel}</b>): <b className="text-[var(--ink)]">{NOCOM_CATS.reduce(function(acc,c){ return acc+nocomTotalsForPeriod[c]; },0)}</b></div>
        </div>
      )}

      <div className="text-center text-xs text-gray-400 mt-6">Sistema CRM creado para uso comercial de Intralog Argentina S.A.<br/>Creado y pensado por Camila Reynaga</div>
      {notesLead && (
        <div className="fixed inset-0 z-50 bg-black/40 flex items-start justify-center p-4 overflow-y-auto" onClick={function(){ setNotesLead(null); }}>
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg mt-12 fade-in" onClick={function(e){ e.stopPropagation(); }}>
            <div className="flex items-center justify-between px-6 py-4 border-b border-[var(--line)]">
              <h2 className="font-bold text-base">Comentarios · {notesLead.cliente}</h2>
              <button onClick={function(){ setNotesLead(null); }} className="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <div className="p-4 max-h-[60vh] overflow-auto divide-y divide-[var(--line)]">
              {(notesLead.historial||[]).length===0 && <div className="text-sm text-gray-400 px-2 py-3">Sin comentarios registrados.</div>}
              {(notesLead.historial||[]).map(function(e,i){ return (<div key={i} className="px-2 py-2"><div className="text-[11px] font-semibold text-[var(--red)]">{fmtDT(e.ts)}</div><div className="text-sm text-gray-700 whitespace-pre-wrap">{e.text}</div></div>); })}
            </div>
            <div className="flex justify-end gap-2 px-6 py-3 border-t border-[var(--line)]">
              <button onClick={function(){ openEdit(notesLead); setNotesLead(null); }} className="px-4 py-2 text-sm rounded-lg text-white font-semibold" style={{background:"var(--red)"}}>Editar / agregar</button>
              <button onClick={function(){ setNotesLead(null); }} className="px-4 py-2 text-sm rounded-lg border border-[var(--line)] hover:bg-gray-50">Cerrar</button>
            </div>
          </div>
        </div>
      )}
      {showForm && <LeadForm initial={editing} onSave={save} onClose={function(){ setShowForm(false); setEditing(null); }}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
